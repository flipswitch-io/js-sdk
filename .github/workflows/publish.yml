name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (web-provider or server-provider)'
        required: true
        type: choice
        options:
          - web-provider
          - server-provider
      version:
        description: 'Version to publish (e.g., 0.1.0)'
        required: true
        type: string

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish web-provider
        if: github.event_name == 'release' || inputs.package == 'web-provider'
        working-directory: packages/web
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            npm version $VERSION --no-git-tag-version
          else
            npm version ${{ inputs.version }} --no-git-tag-version
          fi
          npm publish --access public

      - name: Publish server-provider
        if: github.event_name == 'release' || inputs.package == 'server-provider'
        working-directory: packages/server
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            npm version $VERSION --no-git-tag-version
          else
            npm version ${{ inputs.version }} --no-git-tag-version
          fi
          npm publish --access public
